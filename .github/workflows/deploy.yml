# ============================================
# AdPilot CD — Build Docker image & deploy
# ============================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/addpilot-frontend

jobs:
  # ─────────────────────────────────────────
  # Build & push Docker image to ghcr.io
  # ─────────────────────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }}
            VITE_REDIRECT_URI=${{ secrets.VITE_REDIRECT_URI }}
            VITE_TELEGRAM_BOT_USERNAME=${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
            VITE_CONVEX_SITE_URL=${{ secrets.VITE_CONVEX_SITE_URL }}


  # ─────────────────────────────────────────
  # Deploy Convex Backend (self-hosted)
  # ─────────────────────────────────────────
  deploy-convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate admin key and deploy Convex
        run: |
          ADMIN_KEY=$(node -e "
            const crypto = require('crypto');
            const name = process.env.CONVEX_INSTANCE_NAME;
            const secret = Buffer.from(process.env.CONVEX_INSTANCE_SECRET, 'hex');
            const counter = Buffer.alloc(4); counter.writeUInt32BE(1, 0);
            const aesKey = crypto.createHmac('sha256', secret).update(Buffer.concat([counter, Buffer.from('admin key')])).digest().subarray(0, 16);
            const now = Math.floor(Date.now() / 1000);
            const bn = BigInt(now); const vb = []; let v = bn;
            while (v > 0x7fn) { vb.push(Number((v & 0x7fn) | 0x80n)); v >>= 7n; } vb.push(Number(v & 0x7fn));
            const payload = Buffer.concat([Buffer.from([0x10]), Buffer.from(vb), Buffer.from([0x18, 0x00])]);
            const nonce = crypto.randomBytes(12);
            const ver = Buffer.from([0x01]);
            const { gcmsiv } = require('@noble/ciphers/aes.js');
            const ct = gcmsiv(aesKey, nonce, ver).encrypt(payload);
            console.log(name + '|' + Buffer.concat([ver, nonce, Buffer.from(ct)]).toString('hex'));
          ")
          CONVEX_SELF_HOSTED_ADMIN_KEY="$ADMIN_KEY" npx convex deploy --yes --allow-deleting-large-indexes
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_INSTANCE_NAME: ${{ secrets.CONVEX_INSTANCE_NAME }}
          CONVEX_INSTANCE_SECRET: ${{ secrets.CONVEX_INSTANCE_SECRET }}

  # ─────────────────────────────────────────
  # Trigger Dokploy to pull new image
  # ─────────────────────────────────────────
  trigger-dokploy:
    name: Trigger Dokploy Deploy
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Trigger Dokploy webhook
        run: |
          curl -s -L -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/main","repository":{"full_name":"djollyolly-cell/addPilot0126"}}' \
            "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
